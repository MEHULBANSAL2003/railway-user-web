name: Deploy Frontend

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - dev
          - prod
      branch:
        description: 'Branch to deploy from'
        required: true
        default: 'main'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create env file
        run: |
          if [ "${{ inputs.environment }}" = "prod" ]; then
            echo "VITE_APP_ENV=production" > .env.production
            echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL_PROD }}" >> .env.production
          else
            echo "VITE_APP_ENV=development" > .env.development
            echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL_DEV }}" >> .env.development
          fi

      - name: Build
        run: |
          if [ "${{ inputs.environment }}" = "prod" ]; then
            npm run build:prod
          else
            npm run build:dev
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload to S3
        run: |
          if [ "${{ inputs.environment }}" = "prod" ]; then
            aws s3 sync ./dist s3://${{ secrets.S3_BUCKET_PROD }} --delete
          else
            aws s3 sync ./dist s3://${{ secrets.S3_BUCKET_DEV }} --delete
          fi

      - name: Invalidate CloudFront cache
        run: |
          if [ "${{ inputs.environment }}" = "prod" ]; then
            aws cloudfront create-invalidation \
              --distribution-id ${{ secrets.CLOUDFRONT_PROD }} \
              --paths "/*"
          else
            aws cloudfront create-invalidation \
              --distribution-id ${{ secrets.CLOUDFRONT_DEV }} \
              --paths "/*"
          fi

      - name: Done
        run: |
          if [ "${{ inputs.environment }}" = "prod" ]; then
            echo "✅ Deployed to https://railtick.in"
          else
            echo "✅ Deployed to https://dev.railtick.in"
          fi
